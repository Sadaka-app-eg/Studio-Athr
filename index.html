<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>استوديو أثر - Studio Athr Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-app: #121212;
            --bg-panel: #1a1a1a;
            --bg-card: #222222;
            --gold: #d4af37;
            --cyan: #38b2ac;
            --pink: #ff2d55;
            --border: #2a2a2a;
            --text-muted: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Cairo', sans-serif; display: flex; flex-direction: column; }

        /* 🟢 1. الهيدر العلوي */
        .app-header {
            height: 46px;
            background: var(--bg-app);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-title { font-family: 'Amiri', serif; font-size: 16px; color: var(--gold); display: flex; align-items: center; gap: 6px; }
        .export-btn { background: var(--gold); color: #000; font-weight: 800; border: none; padding: 5px 16px; border-radius: 16px; font-size: 12px; cursor: pointer; }
        .icon-btn { background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; }

        /* 📺 2. كادر الشاشة والمعاينة */
        .preview-stage {
            flex: 1;
            position: relative;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #mainCanvas { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* 🎛️ 3. شريط التشغيل والـ Keyframe */
        .player-bar {
            height: 38px;
            background: var(--bg-app);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            flex-shrink: 0;
        }

        .controls-group { display: flex; align-items: center; gap: 16px; }
        .play-btn { font-size: 20px; color: #fff; cursor: pointer; }

        /* 🎞️ 4. منطقة التايم لاين */
        .timeline-container {
            height: 140px;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            position: relative;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* خط المنتصف الأبيض */
        .playhead {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 20px;
            width: 2px;
            background: #ffffff;
            z-index: 10;
            pointer-events: none;
            transform: translateX(-50%);
        }
        .playhead::before {
            content: ''; position: absolute; top: 0; left: -4px;
            width: 10px; height: 7px; background: #fff;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
        }

        /* التراكات */
        .tracks-scroll {
            flex: 1;
            overflow-x: auto;
            padding: 12px 50%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scrollbar-width: none;
        }
        .tracks-scroll::-webkit-scrollbar { display: none; }

        .track-badge {
            background: var(--cyan);
            color: #000;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 3px;
            width: fit-content;
            margin-bottom: 3px;
        }

        .track-strip {
            height: 44px;
            background: #223330;
            border: 1px solid var(--cyan);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 220px;
            padding: 0 10px;
            font-size: 10px;
            color: #a0aec0;
            white-space: nowrap;
        }

        /* زر الإضافة الوردي العائم */
        .floating-add {
            position: absolute;
            left: 12px;
            bottom: 26px;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: var(--pink);
            color: #fff;
            border: none;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 2px 8px rgba(255, 45, 85, 0.4);
        }

        .time-ruler {
            height: 20px;
            background: #111;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            font-size: 9px;
            color: var(--text-muted);
            font-family: monospace;
        }

        /* 🛠️ 5. شريط القوائم السفلية */
        .bottom-nav {
            background: var(--bg-app);
            border-top: 1px solid var(--border);
            position: relative;
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* اللوحة الفرعية المنبثقة (Overlay فوق الشريط) */
        .drawer-overlay {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 0; right: 0;
            background: #181818;
            border-top: 1px solid var(--border);
            padding: 12px 14px;
            z-index: 100;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.5);
        }
        .drawer-overlay.active { display: block; }

        .tools-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 8px 12px;
            scrollbar-width: none;
        }
        .tools-scroll::-webkit-scrollbar { display: none; }

        .tool-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: none;
            border: none;
            color: #ccc;
            font-size: 10px;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            min-width: 48px;
            flex-shrink: 0;
        }

        .tool-btn .icon { font-size: 18px; color: #fff; }
        .tool-btn:active { color: var(--gold); }
    </style>
</head>
<body>

    <!-- 🟢 1. الشريط العلوي Header -->
    <header class="app-header">
        <button class="icon-btn" onclick="location.reload()">✕</button>
        <div class="header-title">
            <span>📖</span> <span>استوديو أثر</span>
        </div>
        <button class="export-btn" onclick="window.triggerExport()">تصدير</button>
    </header>

    <!-- 📺 2. كادر العرض -->
    <main class="preview-stage">
        <canvas id="mainCanvas" width="720" height="1280"></canvas>
        <video id="hiddenVideo" style="display:none;" crossorigin="anonymous"></video>
    </main>

    <!-- 🎛️ 3. شريط التحكم اللحظي -->
    <div class="player-bar">
        <div class="controls-group">
            <button class="icon-btn" onclick="alert('تراجع')">↩️</button>
            <button class="icon-btn" onclick="alert('تقدم')">↪️</button>
        </div>
        <span class="play-btn" id="playBtn" onclick="window.togglePlay()">▶</span>
        <div class="controls-group">
            <button class="icon-btn" onclick="alert('إضافة كي فريم')">♦️<sup>+</sup></button>
            <button class="icon-btn" onclick="alert('تم الحفظ')">✓</button>
        </div>
    </div>

    <!-- 🎞️ 4. التايم لاين -->
    <div class="timeline-container">
        <div class="playhead"></div>
        <button class="floating-add" onclick="document.getElementById('mediaInput').click()">+</button>

        <div class="tracks-scroll">
            <div>
                <div class="track-badge">الرئيسي 🎛️</div>
                <div class="track-strip" id="videoTrackStrip">
                    اضغط ➕ أو اختر وسائط للبدء
                </div>
            </div>
        </div>

        <div class="time-ruler">
            <span id="curTime">0:00.0</span>
            <span style="letter-spacing: 2px;">• • • • •</span>
            <span id="durTime">0:00.0</span>
        </div>
    </div>

    <!-- 🛠️ 5. الشريط السفلي للأدوات -->
    <div class="bottom-nav">
        <!-- اللوحة الفرعية المنبثقة -->
        <div class="drawer-overlay" id="drawerOverlay">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="color:var(--gold); font-size:12px; font-weight:bold;" id="drawerTitle">المساعد الإسلامي</span>
                <button class="icon-btn" onclick="window.closeDrawer()">✕</button>
            </div>
            <div id="drawerBody" style="margin-top:8px;"></div>
        </div>

        <!-- أزرار كاب كات السفلية -->
        <div class="tools-scroll">
            <button class="tool-btn" onclick="window.openDrawer('ai')">
                <span class="icon">✨</span><span>تأثير AI</span>
            </button>
            <button class="tool-btn" onclick="window.openDrawer('text')">
                <span class="icon">✍️</span><span>نص/آية</span>
            </button>
            <button class="tool-btn" onclick="window.openDrawer('effects')">
                <span class="icon">🌟</span><span>المؤثرات</span>
            </button>
            <button class="tool-btn" onclick="window.openDrawer('filters')">
                <span class="icon">🎨</span><span>فلتر</span>
            </button>
            <button class="tool-btn" onclick="alert('تقسيم المقطع')">
                <span class="icon">✂️</span><span>تقسيم</span>
            </button>
            <button class="tool-btn" onclick="alert('حذف المقطع')">
                <span class="icon">🗑️</span><span>حذف</span>
            </button>
            <button class="tool-btn" onclick="window.openDrawer('stickers')">
                <span class="icon">🕌</span><span>ملصقات</span>
            </button>
        </div>
    </div>

    <input type="file" id="mediaInput" accept="video/*,image/*" style="display:none;" onchange="window.handleUpload(event)" />

    <script>
        const v = document.getElementById('hiddenVideo');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            v.src = URL.createObjectURL(file);
            v.onloadeddata = () => {
                document.getElementById('videoTrackStrip').innerHTML = `🎬 ${file.name}`;
                document.getElementById('durTime').textContent = v.duration.toFixed(1) + 's';
                render();
            };
        }

        function togglePlay() {
            if (!v.src) return alert("اختر فيديو أولاً!");
            if (v.paused) {
                v.play();
                document.getElementById('playBtn').textContent = '⏸';
            } else {
                v.pause();
                document.getElementById('playBtn').textContent = '▶';
            }
        }

        function render() {
            if (v.src) {
                ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
                document.getElementById('curTime').textContent = v.currentTime.toFixed(1) + 's';
            }
            requestAnimationFrame(render);
        }

        function openDrawer(type) {
            const overlay = document.getElementById('drawerOverlay');
            const title = document.getElementById('drawerTitle');
            const body = document.getElementById('drawerBody');
            overlay.classList.add('active');

            if (type === 'ai') {
                title.textContent = "✨ المساعد الإسلامي (AI)";
                body.innerHTML = `<button onclick="alert('جاري إزالة الموسيقى وتصفية الصوت...')" style="width:100%; background:linear-gradient(135deg, #0d3b2e, #1b5e20); color:#fff; border:1px solid var(--gold); padding:8px; border-radius:8px; font-weight:bold; cursor:pointer;">🎵 إزالة الموسيقى بضغطة واحدة</button>`;
            } else if (type === 'text') {
                title.textContent = "✍️ إضافة آية قرآنية";
                body.innerHTML = `<div style="display:flex; gap:6px;"><input type="text" placeholder="اكتب النص هنا..." style="flex:1; padding:6px; background:#000; color:#fff; border:1px solid var(--border); border-radius:6px;" /><button style="background:var(--gold); color:#000; border:none; padding:6px 12px; border-radius:6px; font-weight:bold;">إضافة</button></div>`;
            } else {
                title.textContent = `أدوات (${type})`;
                body.innerHTML = `<span style="color:var(--gold); font-size:11px;">قيد التحديث...</span>`;
            }
        }

        function closeDrawer() {
            document.getElementById('drawerOverlay').classList.remove('active');
        }

        function triggerExport() { alert("⚙️ جاري فتح نافذة التصدير الاحترافية..."); }
    </script>
</body>
</html>
